@if (visible()) {
  <div class="tour" role="dialog" aria-modal="true">
    @if (rect(); as r) {
      <div class="tour__spot" [style]="spotStyle()"></div>
    } @else {
      <div class="tour__dim"></div>
    }

    <div class="tour__pop" [class.tour__pop--center]="!rect()" [style]="rect() ? popStyle() : null">
      <button type="button" class="tour__skip" (click)="skip()">Saltar</button>

      @if (current().icon; as ic) {
        <div class="tour__icon">{{ ic }}</div>
      }
      <h2 class="tour__title">{{ current().title }}</h2>
      <p class="tour__text">{{ current().text }}</p>

      <div class="tour__dots">
        @for (s of steps; track $index) {
          <span class="tour__dot" [class.tour__dot--on]="$index === index()"></span>
        }
      </div>

      @if (current().permission === 'location') {
        <button type="button" class="tour__next" [disabled]="pidiendoPermiso()" (click)="permitirUbicacion()">
          {{ pidiendoPermiso() ? 'Pidiendo…' : 'Permitir ubicación' }}
        </button>
        <button type="button" class="tour__back" (click)="next()">Ahora no</button>
      } @else {
        <button type="button" class="tour__next" (click)="next()">
          {{ isLast() ? 'Empezar' : 'Siguiente' }}
        </button>
        @if (index() > 0 && !isLast()) {
          <button type="button" class="tour__back" (click)="prev()">Atrás</button>
        }
      }
    </div>
  </div>
}
