@if (titulo()) {
  <h1 class="screen__title">{{ titulo() }}</h1>
}
@if (subtitulo()) {
  <p class="screen__subtitle">{{ subtitulo() }}</p>
}

@if (loading()) {
  <app-skeleton [rows]="4" />
} @else if (!disponibles().length) {
  <app-empty-state
    icon="🚗"
    title="No hay vehículos disponibles"
    message="Todos los vehículos están asignados o fuera de servicio ahora mismo. Vuelve más tarde o consulta con Flota."
  />
} @else {
  @for (v of disponibles(); track v.vehiculo_id) {
    <button type="button" class="vpick__btn" (click)="elegir(v)">
      <app-vehiculo-card
        [fotoUrl]="fotoUrls()[v.vehiculo_id]"
        [placa]="v.placa"
        [tipo]="v.tipo"
        [km]="v.km"
        [marca]="v.marca"
        [modelo]="v.modelo"
      />
    </button>
  }
}
