<div class="screen clf">
  <header class="clf__header">
    <button type="button" class="clf__back" (click)="back()" aria-label="Atrás">←</button>
    <span class="clf__icon">✍️</span>
    <h1 class="clf__title">Liberaciones por firmar</h1>
  </header>

  <div class="screen__body">
    @if (!online() && !items().length) {
      <app-empty-state icon="📡" title="Necesitas conexión" message="Las liberaciones por firmar se cargan del servidor. Conéctate para verlas." />
    } @else if (loading()) {
      <app-skeleton [rows]="4" />
    } @else if (error()) {
      <app-empty-state icon="⚠️" title="No se pudieron cargar" message="Revisa tu conexión e inténtalo de nuevo." ctaLabel="Reintentar" (action)="load()" />
    } @else {
      @for (c of items(); track c.id) {
        <button type="button" class="clf-row" (click)="abrir(c.id)">
          <div class="clf-row__info">
            <span class="clf-row__obra">{{ c.proyecto }}</span>
            <span class="clf-row__pl">{{ c.plantilla }}</span>
            <span class="clf-row__fecha">{{ fmt(c.created_at) }}</span>
            @if (c.faltantes.length) {
              <span class="clf-row__faltan">Faltan: {{ c.faltantes.join(', ') }}</span>
            } @else {
              <span class="clf-row__ok">Firmas obligatorias completas</span>
            }
          </div>
          <span class="clf-row__chev">›</span>
        </button>
      } @empty {
        <app-empty-state icon="✅" title="Sin liberaciones pendientes" message="No hay checklists de liberación esperando firma ahora mismo." />
      }
    }
  </div>
</div>
