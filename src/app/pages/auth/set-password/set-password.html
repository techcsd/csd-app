<div class="screen login">
  <div class="login__brand">
    <h1 class="login__title">Nueva contraseña</h1>
    <p class="login__tagline">Escribe tu nueva contraseña.</p>
  </div>

  <form class="login__form" (ngSubmit)="submit()">
    <label class="field-label" for="password">Contraseña</label>
    <input
      id="password"
      class="field"
      type="password"
      autocomplete="new-password"
      [ngModel]="password()"
      (ngModelChange)="password.set($event)"
      name="password"
    />
    <label class="field-label" for="confirm">Repite la contraseña</label>
    <input
      id="confirm"
      class="field"
      type="password"
      autocomplete="new-password"
      [ngModel]="confirm()"
      (ngModelChange)="confirm.set($event)"
      name="confirm"
    />
    <button type="submit" class="btn-cta login__submit" [disabled]="loading()">
      {{ loading() ? 'Guardando…' : 'Guardar' }}
    </button>
  </form>
</div>
