<div class="screen login">
  <div class="login__brand">
    <div class="login__logo">CSD</div>
    <h1 class="login__title">CSD App</h1>
    <p class="login__tagline">Constructora SD — App de campo</p>
  </div>

  <!-- P5 — elegir vía de acceso -->
  <div class="login__tabs" role="tablist">
    <button
      type="button"
      class="login__tab"
      [class.login__tab--on]="modo() === 'correo'"
      (click)="setModo('correo')"
    >
      Con correo
    </button>
    <button
      type="button"
      class="login__tab"
      [class.login__tab--on]="modo() === 'conductor'"
      (click)="setModo('conductor')"
    >
      Soy conductor
    </button>
  </div>

  @if (modo() === 'correo') {
    <form class="login__form" (ngSubmit)="submit()">
      <label class="field-label" for="email">Correo</label>
      <input
        id="email"
        class="field"
        type="email"
        inputmode="email"
        autocomplete="username"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        name="email"
        placeholder="tucorreo@constructorasd.com"
      />

      <label class="field-label" for="password">Contraseña</label>
      <input
        id="password"
        class="field"
        type="password"
        autocomplete="current-password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        name="password"
      />

      <button type="submit" class="btn-cta login__submit" [disabled]="loading()">
        {{ loading() ? 'Entrando…' : 'Entrar' }}
      </button>

      <a class="login__forgot" routerLink="/auth/reset">Olvidé mi contraseña</a>
    </form>
  } @else {
    <form class="login__form" (ngSubmit)="submitConductor()">
      <label class="field-label" for="cedula">Cédula</label>
      <input
        id="cedula"
        class="field"
        type="text"
        inputmode="numeric"
        autocomplete="off"
        [ngModel]="cedula()"
        (ngModelChange)="cedula.set($event)"
        name="cedula"
        placeholder="000-0000000-0"
      />

      <label class="field-label" for="pin">PIN de acceso</label>
      <input
        id="pin"
        class="field login__pin"
        type="password"
        inputmode="numeric"
        autocomplete="off"
        maxlength="6"
        [ngModel]="pin()"
        (ngModelChange)="pin.set($event)"
        name="pin"
        placeholder="••••••"
      />

      <button type="submit" class="btn-cta login__submit" [disabled]="loading()">
        {{ loading() ? 'Entrando…' : 'Entrar' }}
      </button>

      <p class="login__hint">
        ¿No tienes acceso? Pídele a administración que te lo genere desde tu perfil de conductor.
      </p>
    </form>
  }
</div>
