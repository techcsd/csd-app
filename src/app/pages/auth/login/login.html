<div class="screen login">
  <div class="login__brand">
    <div class="login__logo">CSD</div>
    <h1 class="login__title">CSD App</h1>
    <p class="login__tagline">Constructora SD — App de campo</p>
  </div>

  <form class="login__form" (ngSubmit)="submit()">
    <label class="field-label" for="email">Correo</label>
    <input
      id="email"
      class="field"
      type="email"
      inputmode="email"
      autocomplete="username"
      [ngModel]="email()"
      (ngModelChange)="email.set($event)"
      name="email"
      placeholder="tucorreo@constructorasd.com"
    />

    <label class="field-label" for="password">Contraseña</label>
    <input
      id="password"
      class="field"
      type="password"
      autocomplete="current-password"
      [ngModel]="password()"
      (ngModelChange)="password.set($event)"
      name="password"
    />

    <button type="submit" class="btn-cta login__submit" [disabled]="loading()">
      {{ loading() ? 'Entrando…' : 'Entrar' }}
    </button>

    <a class="login__forgot" routerLink="/auth/reset">Olvidé mi contraseña</a>
  </form>
</div>
