<div class="screen home">
  <header class="home__header">
    <div>
      <p class="home__greeting">Hola, {{ nombre() }} 👷</p>
      @if (obra(); as o) {
        <p class="home__obra">Obra: {{ o.nombre }}</p>
      }
    </div>
    <button type="button" class="home__logout" (click)="perfil()" aria-label="Mi perfil" data-tour="perfil">⚙️ Perfil</button>
  </header>

  <main class="home__grid" data-tour="tiles">
    @for (tile of tiles(); track tile.modulo) {
      <app-big-button
        [icon]="tile.icon"
        [label]="tile.label"
        [tint]="tile.tint"
        [badge]="badgeFor(tile.modulo)"
        (pressed)="open(tile)"
      />
    } @empty {
      <app-empty-state
        icon="🔑"
        title="Sin módulos asignados"
        message="Tu usuario todavía no tiene módulos habilitados en la app. Escríbenos y administración te dará acceso."
        ctaLabel="Reportar / pedir acceso"
        (action)="reportar()"
      />
    }
  </main>

  <!-- Non-gated: everyone can report a problem or improvement. -->
  <footer class="home__footer">
    <button type="button" class="home__report" (click)="reportar()" data-tour="reportar">
      🛟 Reportar un problema o mejora
    </button>
  </footer>

  <app-sync-bar data-tour="sync" />

  <app-onboarding />
</div>
