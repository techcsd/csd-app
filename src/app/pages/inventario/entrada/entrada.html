@if (done()) {
  <app-big-confirm
    [title]="online ? 'Entrada registrada' : 'Guardado'"
    [note]="online ? 'El stock se sumó.' : 'Sin señal. Se enviará solo.'"
    [tone]="online ? 'done' : 'pending'"
    buttonLabel="Listo"
    (dismissed)="finish()"
  />
} @else {
  <div class="screen mov">
    <header class="mov__header mov__header--in">
      <button type="button" class="mov__back" (click)="back()" aria-label="Atrás">←</button>
      <h1 class="mov__title">➕ Entrada de material</h1>
    </header>

    <div class="screen__body">
      <app-select-list label="Almacén" icon="🏬" [options]="bodegaOptions()" [selectedId]="bodegaId()" (picked)="bodegaId.set($event)" />

      <label class="field-label mov__mt">¿De dónde viene el material?</label>
      <div class="mov__motivos">
        @for (m of motivos; track m) {
          <button type="button" class="chip" [class.chip--on]="motivo() === m" (click)="motivo.set(m)">{{ m }}</button>
        }
      </div>

      <label class="field-label mov__mt">Elige el material</label>
      <app-articulo-picker [articulos]="articulos()" [exclude]="cartIds()" (picked)="add($event)" />

      @if (cart().length) {
        <label class="field-label mov__mt">Cantidades</label>
      }
      @for (it of cart(); track it.articulo_id) {
        <div class="mov__item">
          <span class="mov__item-name">{{ it.nombre }}</span>
          <div class="mov__item-qty">
            <input class="field" type="number" inputmode="decimal" [ngModel]="it.cantidad" (ngModelChange)="setCantidad($index, $event)" />
            <span class="mov__item-unit">{{ it.unidad }}</span>
            <button type="button" class="mov__item-x" (click)="remove($index)">✕</button>
          </div>
        </div>
      } @empty {
        <p class="mov__muted">Aún no has agregado materiales.</p>
      }

      <button type="button" class="btn-ghost mov__mt" [disabled]="capturing()" (click)="addFoto()">
        {{ foto() ? '✅ Foto agregada' : (capturing() ? '⏳ Tomando…' : '📷 Foto (opcional)') }}
      </button>
    </div>

    <footer class="mov__nav">
      <button type="button" class="btn-cta" [disabled]="submitting()" (click)="submit()">
        {{ submitting() ? 'Guardando…' : 'Confirmar entrada' }}
      </button>
    </footer>
  </div>
}
