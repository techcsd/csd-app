<div class="screen enp">
  <header class="enp__header">
    <button type="button" class="enp__back" (click)="back()" aria-label="Atrás">←</button>
    <span class="enp__icon">📝</span>
    <h1 class="enp__title">Documentación en proceso</h1>
  </header>

  <div class="screen__body">
    @if (loading()) {
      <app-skeleton [rows]="4" />
    } @else if (!borradores().length) {
      <app-empty-state
        icon="✅"
        title="Nada a medio llenar"
        message="Aquí aparecen los formularios que empezaste y no has enviado, para que los retomes."
      />
    } @else {
      @for (b of borradores(); track b.clave) {
        <div class="enp__card">
          <div class="enp__info">
            <span class="enp__label">{{ etiqueta(b) }}</span>
            <span class="enp__fecha">Guardado {{ fmt(b.updated_at) }}</span>
          </div>
          <div class="enp__actions">
            <button type="button" class="btn-cta enp__retomar" (click)="retomar(b)">Retomar</button>
            <button type="button" class="btn-ghost enp__desc" (click)="pedirDescartar(b)">Descartar</button>
          </div>
        </div>
      }
    }
  </div>

  <app-confirm-dialog
    [open]="!!confirmar()"
    title="¿Descartar el borrador?"
    message="Perderás lo que llevas llenado en ese documento."
    confirmLabel="Sí, descartar"
    cancelLabel="Cancelar"
    tone="danger"
    (confirmed)="descartar()"
    (cancelled)="confirmar.set(null)"
  />
</div>
