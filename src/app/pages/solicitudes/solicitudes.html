<div class="screen solicitudes">
  <header class="sol-header">
    <button type="button" class="sol-header__back" (click)="back()" aria-label="Atrás">←</button>
    <span class="sol-header__icon">🛒</span>
    <h1 class="sol-header__title">Requisiciones</h1>
  </header>

  <div class="screen__body">
    <button type="button" class="sol-action sol-action--primary" (click)="go('/solicitudes/pedir')">
      <span class="sol-action__icon">🛒</span>
      <span class="sol-action__label">Nueva requisición</span>
    </button>
    <button type="button" class="sol-action" (click)="go('/solicitudes/mis')">
      <span class="sol-action__icon">📋</span>
      <span class="sol-action__label">Mis requisiciones</span>
    </button>
  </div>

  <app-sync-bar />
</div>
