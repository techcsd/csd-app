<div class="screen avisos">
  <header class="avisos__header">
    <button type="button" class="avisos__back" (click)="back()" aria-label="Atrás">←</button>
    <span class="avisos__icon">🔔</span>
    <h1 class="avisos__title">Avisos de flota</h1>
  </header>

  <div class="screen__body">
    @if (loading()) {
      <app-skeleton [rows]="5" />
    } @else if (!avisos().length) {
      <app-empty-state icon="✅" title="Sin avisos pendientes" message="No hay avisos de flota por atender ahora mismo." />
    } @else {
      @for (a of avisos(); track a.id) {
        <div class="avisos__card" [class.avisos__card--alta]="a.severidad === 'alta'">
          <div class="avisos__top">
            <span class="avisos__tipo">{{ tipoLabel(a.tipo) }}</span>
            @if (a.vehiculo?.placa) { <span class="avisos__placa">{{ a.vehiculo?.placa }}</span> }
          </div>
          @if (a.mensaje) { <p class="avisos__msg">{{ a.mensaje }}</p> }
          <p class="avisos__fecha">{{ fmtFecha(a.created_at) }}</p>
          <div class="avisos__actions">
            @if (puedeVer(a)) {
              <button type="button" class="btn-ghost avisos__ver" (click)="irAlItem(a)">
                {{ a.tipo === 'reporte_semanal' ? '📋 Ver reporte' : '🚚 Ver vehículo' }}
              </button>
            }
            <button
              type="button"
              class="btn-cta avisos__cta"
              [disabled]="busyId() === a.id"
              (click)="accion(a)"
            >
              {{ busyId() === a.id ? 'Procesando…' : (esBloqueo(a) ? 'Reactivar vehículo' : 'Marcar atendido') }}
            </button>
          </div>
        </div>
      }
    }
  </div>
</div>
