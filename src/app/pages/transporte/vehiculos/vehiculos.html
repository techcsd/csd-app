<div class="screen vlist">
  <header class="vlist__header">
    <button type="button" class="vlist__back" (click)="back()" aria-label="Atrás">←</button>
    <span class="vlist__icon">🚙</span>
    <h1 class="vlist__title">Vehículos</h1>
  </header>

  <div class="screen__body">
    @if (esAdmin()) {
      <button type="button" class="btn-cta vlist__add" (click)="nuevo()">➕ Agregar vehículo</button>
    }

    <input
      class="field vlist__search"
      type="text"
      [ngModel]="query()"
      (ngModelChange)="query.set($event)"
      placeholder="Buscar por placa, marca o tipo…"
    />

    @if (loading()) {
      <app-skeleton [rows]="5" />
    } @else if (!lista().length) {
      <app-empty-state
        icon="🚙"
        title="Sin vehículos"
        [message]="query() ? 'Ningún vehículo coincide con tu búsqueda.' : 'No hay vehículos activos en la flota.'"
      />
    } @else {
      @for (v of lista(); track v.vehiculo_id) {
        <button type="button" class="vlist__btn" (click)="ver(v)">
          <app-vehiculo-card
            [fotoUrl]="fotoUrls()[v.vehiculo_id]"
            [placa]="v.placa"
            [tipo]="v.tipo"
            [km]="v.km"
            [marca]="v.marca"
            [modelo]="v.modelo"
          />
        </button>
      }
    }
  </div>
</div>
