<div class="screen clist">
  <header class="clist__header">
    <button type="button" class="clist__back" (click)="back()" aria-label="Atrás">←</button>
    <span class="clist__icon">🪪</span>
    <h1 class="clist__title">Conductores</h1>
  </header>

  <div class="screen__body">
    <input
      class="field clist__search"
      type="text"
      [ngModel]="query()"
      (ngModelChange)="query.set($event)"
      placeholder="Buscar por nombre o cédula…"
    />

    @if (loading()) {
      <app-skeleton [rows]="5" />
    } @else if (!lista().length) {
      <app-empty-state
        icon="🪪"
        title="Sin conductores"
        [message]="query() ? 'Ningún conductor coincide con tu búsqueda.' : 'No hay conductores registrados todavía.'"
      />
    } @else {
      @for (c of lista(); track c.id) {
        <button type="button" class="clist__row" (click)="ver(c)">
          <span class="clist__avatar">{{ (c.nombre || '?').charAt(0) }}</span>
          <span class="clist__info">
            <span class="clist__name">{{ c.nombre }}</span>
            @if (c.cedula) { <span class="clist__ced">{{ c.cedula }}</span> }
            <span
              class="clist__lic"
              [class.clist__lic--warn]="licEstado(c) === 'por_vencer'"
              [class.clist__lic--bad]="licEstado(c) === 'vencida'"
            >{{ licLabel(c) }}</span>
          </span>
          <span class="clist__chev">›</span>
        </button>
      }
    }
  </div>
</div>
