<app-toast-host />

@if (version.debeActualizar()) {
  <!-- R15: blocking gate when the local build is below the published minimum -->
  <div class="version-gate">
    <div class="version-gate__card">
      <span class="version-gate__icon">⬆️</span>
      <h1 class="version-gate__title">Actualiza la app</h1>
      <p class="version-gate__msg">
        Esta versión ({{ version.local }}) ya no está disponible. Descarga la versión
        {{ version.info()?.version_minima }} o superior para seguir trabajando.
      </p>
      @if (version.apkUrl) {
        <button type="button" class="version-gate__btn" (click)="abrirDescarga()">Descargar actualización</button>
      }
    </div>
  </div>
} @else {
  <router-outlet />
}
